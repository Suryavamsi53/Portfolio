<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SVV</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .btn { width: 100%; border: none; cursor: pointer; }
        .error-msg { color: #ff4b2b; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body class="login-page">
    <div class="login-card glass-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="logo.png" alt="SVV Logo" style="height: 90px;">
        </div>
        <h2 style="margin-bottom: 30px; text-align: center;">Admin Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn primary-btn">Login to Dashboard</button>
            <p id="error" class="error-msg">Invalid username or password</p>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        // Direct initialization since script is at the bottom of the body
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const passwordInput = document.getElementById('password').value;
                const error = document.getElementById('error');

                try {
                    const response = await fetch('api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password: passwordInput })
                    });

                    if (response.ok) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    
                    if (response.status === 401) {
                        error.style.display = 'block';
                        error.innerText = 'Invalid username or password';
                        return;
                    }
                } catch (err) {
                    console.error('Login Error:', err);
                    error.style.display = 'block';
                    error.innerText = 'System Connection Error';
                }
            });
        }
    </script>
</body>
</html>
