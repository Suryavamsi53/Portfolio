<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVV Mail | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        :root {
            --logout-red: #ff3b3b;
        }
        .dashboard-layout { 
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 80px);
            margin-top: 80px;
        }
        .inbox-sidebar {
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
        }
        .gmail-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .gmail-item:hover { background: rgba(255,255,255,0.05); }
        .gmail-item.active { background: rgba(0, 212, 255, 0.1); border-left: 4px solid var(--accent-secondary); }
        .gmail-top { display: flex; justify-content: space-between; align-items: center; }
        .gmail-sender { font-weight: 700; font-size: 0.9rem; color: var(--accent-secondary); }
        .gmail-time { font-size: 0.75rem; color: var(--text-secondary); }
        .gmail-snippet { font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .message-viewer { padding: 40px; overflow-y: auto; background: var(--bg-color); }
        .viewer-header { margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .viewer-actions { display: flex; gap: 15px; margin-top: 20px; }
        
        #map-container { padding: 20px; border-bottom: 1px solid var(--glass-border); }
        #map { height: 200px; border-radius: 12px; }

        .logout-btn-colored {
            background: var(--logout-red) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 15px rgba(255, 59, 59, 0.3);
            font-weight: 700;
        }
        .logout-btn-colored:hover {
            transform: scale(1.05);
            background: #ff5252 !important;
        }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.5; }
    </style>
</head>
<body style="overflow: hidden;">
    <div id="custom-cursor"></div>
    <nav class="glass-nav">
        <div class="logo"><img src="logo.png" alt="SVV Logo" style="height: 50px; vertical-align: middle;"> <span style="font-size: 0.9rem; margin-left: 10px; opacity: 0.7;">Mail</span></div>
        <button class="btn logout-btn-colored" onclick="logout()">Terminate Session</button>
    </nav>

    <main class="dashboard-layout">
        <aside class="inbox-sidebar">
            <div id="map-container">
                <div id="map"></div>
            </div>
            <div id="inbox-list">
                <!-- Items injected here -->
            </div>
        </aside>

        <section id="viewer" class="message-viewer">
            <div class="empty-state">
                <i data-lucide="mail" style="width: 64px; height: 64px; margin-bottom: 20px;"></i>
                <p>Select a transmission to view details</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        let allMessages = [];
        const delay = ms => new Promise(res => setTimeout(res, ms));
        const map = L.map('map', {zoomControl: false}).setView([20, 0], 1);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function fetchMessages() {
            const response = await fetch('/api/messages');
            if (response.status === 401) { window.location.href = '/login.html'; return; }
            
            allMessages = await response.json();
            renderInbox();
            plotAllMarkers();
        }

        function renderInbox() {
            const list = document.getElementById('inbox-list');
            list.innerHTML = '';
            
            allMessages.slice().reverse().forEach((msg, idx) => {
                const originalIndex = allMessages.length - 1 - idx;
                const item = document.createElement('div');
                item.className = 'gmail-item';
                item.id = `msg-${originalIndex}`;
                item.onclick = () => selectMessage(originalIndex);
                item.innerHTML = `
                    <div class="gmail-top">
                        <span class="gmail-sender">${msg.name}</span>
                        <span class="gmail-time">${new Date(msg.time).toLocaleDateString()}</span>
                    </div>
                    <div class="gmail-snippet">${msg.message}</div>
                `;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        async function plotAllMarkers() {
            // Plot markers sequentially with a delay to avoid rate limiting
            for (let i = 0; i < allMessages.length; i++) {
                const msg = allMessages[i];
                if (msg.region && msg.country) {
                    await delay(1000); // 1 second delay between geocoding requests
                    const coords = await geocode(msg.region, msg.country);
                    if (coords) {
                        const marker = L.circleMarker(coords, {
                            radius: 6,
                            fillColor: "#00d4ff",
                            color: "#fff",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map);
                        marker.bindPopup(`<b>${msg.name}</b><br>${msg.region}, ${msg.country}`);
                    }
                }
            }
        }

        async function geocode(region, country) {
            const query = `${region}, ${country}`;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) return [data[0].lat, data[0].lon];
            } catch (e) {}
            return null;
        }

        async function selectMessage(index) {
            const msg = allMessages[index];
            document.querySelectorAll('.gmail-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`msg-${index}`).classList.add('active');
            
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = `
                <div class="viewer-header">
                    <h2>${msg.name}</h2>
                    <p style="color: var(--accent-secondary)">${msg.email} | ${msg.phone || 'No Phone'}</p>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                        Sent from ${msg.region}, ${msg.country} • ${new Date(msg.time).toLocaleString()}
                    </p>
                    <div class="viewer-actions">
                        <button class="btn secondary-btn" onclick="deleteMessage(${index})" style="background: rgba(255,0,0,0.1); color: #ff3b3b; border-color: rgba(255,0,0,0.2);">
                            <i data-lucide="trash-2" style="width: 16px; margin-right: 5px;"></i> Delete
                        </button>
                    </div>
                </div>
                <div class="msg-body" style="font-size: 1.1rem; line-height: 1.8;">${msg.message}</div>
                <div class="glass-card" style="margin-top: 40px; padding: 20px;">
                    <p><strong>Company:</strong> ${msg.company || 'Private Entity'}</p>
                    <p><strong>Region/Country:</strong> ${msg.region}, ${msg.country}</p>
                </div>
            `;
            lucide.createIcons();

            // Instant fly-to
            const coords = await geocode(msg.region, msg.country);
            if (coords) map.flyTo(coords, 6, {animate: true, duration: 1.5});
        }

        async function deleteMessage(index) {
            if (!confirm("Are you sure you want to delete this transmission?")) return;
            const resp = await fetch('/api/messages/update', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            });
            if (resp.ok) window.location.reload();
        }

        function logout() {
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = '/login.html';
        }

        fetchMessages();
    </script>
</body>
</html>
