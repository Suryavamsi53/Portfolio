<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVV Mail | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        :root {
            --logout-red: #ff3b3b;
        }
        .dashboard-layout { 
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 80px);
            margin-top: 80px;
        }
        .inbox-sidebar {
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            height: 100%;
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }
        .tab-btn.active {
            color: var(--accent-secondary);
            background: rgba(255,255,255,0.05);
            border-bottom: 2px solid var(--accent-secondary);
        }
        
        #inbox-list {
            flex-grow: 1;
            height: 0;
            overflow-y: auto;
            min-height: 0;
        }
        
        .gmail-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .gmail-item:hover { background: rgba(255,255,255,0.05); }
        .gmail-item.active { background: rgba(0, 212, 255, 0.1); border-left: 4px solid var(--accent-secondary); }
        .gmail-top { display: flex; justify-content: space-between; align-items: center; }
        .gmail-sender { font-weight: 700; font-size: 0.9rem; color: var(--accent-secondary); }
        .gmail-time { font-size: 0.75rem; color: var(--text-secondary); }
        .gmail-snippet { font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .message-viewer { padding: 40px; overflow-y: auto; background: var(--bg-color); display: block; }
        .big-map-view { display: none; height: 100%; position: relative; }
        #big-map { height: 100%; width: 100%; }

        .viewer-header { margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .viewer-actions { display: flex; gap: 15px; margin-top: 20px; }
        
        #mini-map-container { 
            padding: 15px; 
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }
        #mini-map { height: 150px; border-radius: 12px; }

        .logout-btn-colored {
            background: var(--logout-red) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 15px rgba(255, 59, 59, 0.3);
            font-weight: 700;
        }
        .logout-btn-colored:hover {
            transform: scale(1.05);
            background: #ff5252 !important;
        }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; opacity: 0.5; }
        
        .map-overlay-stats {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 5, 10, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            min-width: 200px;
        }
    </style>
</head>
<body style="overflow: hidden;">
    <nav class="glass-nav">
        <div class="logo"><img src="logo.png" alt="SVV Logo" style="height: 50px; vertical-align: middle;"> <span style="font-size: 0.9rem; margin-left: 10px; opacity: 0.7;">Mail Dashboard</span></div>
        <button class="btn logout-btn-colored" onclick="logout()">Terminate Session</button>
    </nav>

    <main class="dashboard-layout">
        <aside class="inbox-sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" onclick="switchView('inbox')" id="tab-inbox">
                    <i data-lucide="inbox" style="width: 18px;"></i> Inbox
                </button>
                <button class="tab-btn" onclick="switchView('map')" id="tab-map">
                    <i data-lucide="globe" style="width: 18px;"></i> Live Map
                </button>
                <button class="tab-btn" onclick="switchView('employees')" id="tab-employees">
                    <i data-lucide="users" style="width: 18px;"></i> Employees
                </button>
            </div>
            
            <div id="mini-map-container">
                <div id="mini-map"></div>
            </div>
            
            <div id="inbox-list">
                <!-- Items injected here -->
            </div>
        </aside>

        <section id="viewer" class="message-viewer">
            <div class="empty-state">
                <i data-lucide="mail" style="width: 64px; height: 64px; margin-bottom: 20px;"></i>
                <p>Select a transmission to view details</p>
            </div>
        </section>

        <section id="map-view" class="big-map-view">
            <div id="big-map"></div>
            <div class="map-overlay-stats">
                <h3 style="color: var(--accent-secondary); margin-bottom: 10px;">Global Reach</h3>
                <div id="reach-stats">
                    <p>Scanning global transmissions...</p>
                </div>
            </div>
        </section>

        <section id="employees-view" style="display: none; padding: 40px; overflow-y: auto; background: var(--bg-color); width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px;">
                <h2 style="font-family: 'Outfit', sans-serif;">Employee Directory & Performance</h2>
                <button class="btn" style="background: var(--accent-secondary); color: #000; font-weight: 700; border-radius: 8px;" onclick="openAddEmployeeModal()">+ Add Employee</button>
            </div>
            
            <div id="employees-list" style="display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));">
                <!-- Employee cards injected here -->
            </div>
        </section>
    </main>

    <!-- Add Employee Modal -->
    <div id="employee-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div class="glass-card" style="width: 400px; padding: 30px;">
            <h3 style="margin-bottom: 20px;">Add Employee</h3>
            <form id="add-employee-form">
                <div class="form-group" style="margin-bottom: 15px;"><label style="display:block; margin-bottom:5px;">Username</label><input type="text" id="emp-username" required style="width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 5px;"></div>
                <div class="form-group" style="margin-bottom: 15px;"><label style="display:block; margin-bottom:5px;">Password</label><input type="password" id="emp-password" required style="width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 5px;"></div>
                <div class="form-group" style="margin-bottom: 15px;"><label style="display:block; margin-bottom:5px;">Designation</label><input type="text" id="emp-designation" placeholder="e.g. Senior Dev" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 5px;"></div>
                <div class="form-group" style="margin-bottom: 15px;"><label style="display:block; margin-bottom:5px;">Role</label>
                    <select id="emp-role" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; border-radius: 5px;">
                        <option value="employee">Employee</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn" style="background:transparent; border: 1px solid var(--glass-border); color: #fff;" onclick="document.getElementById('employee-modal').style.display='none'">Cancel</button>
                    <button type="submit" class="btn" style="background: var(--accent-secondary); color: #000;">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allMessages = [];
        let miniMap, bigMap;
        let markers = [];
        let geoCache = {}; // Cache for geocoding results
        
        const delay = ms => new Promise(res => setTimeout(res, ms));

        function initMaps() {
            // Mini Map
            miniMap = L.map('mini-map', {zoomControl: false, attributionControl: false}).setView([20, 0], 1);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(miniMap);

            // Big Map
            bigMap = L.map('big-map', {zoomControl: true}).setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(bigMap);
        }

        initMaps();

        async function fetchMessages() {
            try {
                const response = await fetch('api/messages');
                if (response.status === 401) { window.location.href = 'login.html'; return; }
                
                if (response.ok) {
                    allMessages = await response.json();
                } else {
                    throw new Error('Server Error');
                }
            } catch (err) {
                console.error('Fetch Error:', err);
            }
            
            renderInbox();
            if (allMessages.length > 0) selectMessage(allMessages.length - 1);
            await plotMarkersOnBoth();
            updateStats();
        }

        function renderInbox() {
            const list = document.getElementById('inbox-list');
            list.innerHTML = '';
            
            allMessages.slice().reverse().forEach((msg, idx) => {
                const originalIndex = allMessages.length - 1 - idx;
                const item = document.createElement('div');
                item.className = 'gmail-item';
                item.id = `msg-${originalIndex}`;
                item.onclick = () => selectMessage(originalIndex);
                item.innerHTML = `
                    <div class="gmail-top">
                        <span class="gmail-sender">${msg.name}</span>
                        <span class="gmail-time">${new Date(msg.time).toLocaleDateString()}</span>
                    </div>
                    <div class="gmail-snippet">${msg.message}</div>
                `;
                list.appendChild(item);
            });
            if (window.lucide) lucide.createIcons();
        }

        async function plotMarkersOnBoth() {
            // Clean up existing markers
            markers.forEach(m => {
                miniMap.removeLayer(m.mini);
                bigMap.removeLayer(m.big);
            });
            markers = [];

            // Plot markers
            for (let i = 0; i < allMessages.length; i++) {
                const msg = allMessages[i];
                if (msg.region || msg.country) {
                    const cacheKey = `${msg.region}, ${msg.country}`.toLowerCase();
                    let coords = geoCache[cacheKey];
                    
                    if (!coords) {
                        // Rate limiting protection for Nominatim
                        await delay(800); 
                        coords = await geocode(msg.region, msg.country);
                        if (coords) geoCache[cacheKey] = coords;
                    }
                    
                    if (coords) {
                        const mini = L.circleMarker(coords, {
                            radius: 4,
                            fillColor: "#00d4ff",
                            color: "#fff",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(miniMap);

                        const big = L.circleMarker(coords, {
                            radius: 8,
                            fillColor: "#00d4ff",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.6
                        }).addTo(bigMap);

                        big.bindPopup(`
                            <div style="color: #000; font-family: 'Inter', sans-serif;">
                                <strong style="font-size: 1rem;">${msg.name}</strong><br>
                                <span style="color: #666;">${msg.region || ''}, ${msg.country}</span><br>
                                <small style="display: block; margin-top: 5px; color: #888;">${new Date(msg.time).toLocaleString()}</small>
                            </div>
                        `);

                        markers[i] = { mini, big, coords };
                    }
                }
            }
        }

        async function geocode(region, country) {
            const query = [region, country].filter(x => x).join(', ');
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            } catch (e) {
                console.error('Geocoding error:', e);
            }
            return null;
        }

        function updateStats() {
            const stats = document.getElementById('reach-stats');
            const countries = [...new Set(allMessages.filter(m => m.country).map(m => m.country))];
            stats.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Transmissions:</span>
                    <strong style="color:#fff">${allMessages.length}</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>Global Nodes:</span>
                    <strong style="color:#fff">${countries.length}</strong>
                </div>
                <div style="font-size: 0.7rem; opacity: 0.6; line-height: 1.4; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                    ${countries.join(' • ')}
                </div>
                <div style="margin-top: 15px; font-size: 0.65rem; color: var(--accent-secondary); display: flex; align-items: center; gap: 5px;">
                    <span style="width: 8px; height: 8px; background: var(--accent-secondary); border-radius: 50%; display: inline-block;"></span>
                    SYSTEM ONLINE • SCANNING LIVE
                </div>
            `;
        }

        function switchView(view) {
            const viewer = document.getElementById('viewer');
            const mapView = document.getElementById('map-view');
            const employeesView = document.getElementById('employees-view');
            const tabInbox = document.getElementById('tab-inbox');
            const tabMap = document.getElementById('tab-map');
            const tabEmployees = document.getElementById('tab-employees');

            viewer.style.display = 'none';
            mapView.style.display = 'none';
            if (employeesView) employeesView.style.display = 'none';
            
            tabInbox.classList.remove('active');
            tabMap.classList.remove('active');
            if (tabEmployees) tabEmployees.classList.remove('active');

            if (view === 'inbox') {
                viewer.style.display = 'block';
                tabInbox.classList.add('active');
            } else if (view === 'map') {
                mapView.style.display = 'block';
                tabMap.classList.add('active');
                setTimeout(() => bigMap.invalidateSize(), 100);
            } else if (view === 'employees') {
                employeesView.style.display = 'block';
                tabEmployees.classList.add('active');
                fetchEmployees();
            }
        }

        async function selectMessage(index) {
            const msg = allMessages[index];
            switchView('inbox');
            
            document.querySelectorAll('.gmail-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`msg-${index}`).classList.add('active');
            
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = `
                <div class="viewer-header">
                    <h2>${msg.name}</h2>
                    <p style="color: var(--accent-secondary)">${msg.email} | ${msg.phone || 'No Phone'}</p>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                        Sent from ${msg.region || 'Unknown Region'}, ${msg.country} • ${new Date(msg.time).toLocaleString()}
                    </p>
                    <div class="viewer-actions">
                        <button class="btn secondary-btn" onclick="deleteMessage(${index})" style="background: rgba(255,0,0,0.1); color: #ff3b3b; border-color: rgba(255,0,0,0.2);">
                            <i data-lucide="trash-2" style="width: 16px; margin-right: 5px;"></i> Delete
                        </button>
                    </div>
                </div>
                <div class="msg-body">${msg.message}</div>
                <div class="glass-card" style="margin-top: 40px; padding: 25px; background: rgba(255,255,255,0.01); border-color: rgba(0,212,255,0.1);">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                        <div>
                            <p style="color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">Organization</p>
                            <p><strong>${msg.company || 'Private Entity'}</strong></p>
                        </div>
                        <div>
                            <p style="color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">Origin Data</p>
                            <p><strong>${msg.region || 'N/A'}, ${msg.country}</strong></p>
                        </div>
                    </div>
                </div>
            `;
            if (window.lucide) lucide.createIcons();

            // Fly to marker if exists
            if (markers[index] && markers[index].coords) {
                miniMap.flyTo(markers[index].coords, 6, {animate: true, duration: 1.5});
            }
        }

        async function deleteMessage(index) {
            const msg = allMessages[index];
            if (!confirm("Are you sure you want to delete this transmission?")) return;
            try {
                const resp = await fetch('api/messages/update', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ index, id: msg.id })
                });
                if (resp.ok) window.location.reload();
                else alert("Failed to delete message: Server error.");
            } catch (err) {
                alert("Action failed: Connection to backend lost.");
            }
        }

        function logout() {
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = 'login.html';
        }

        async function fetchEmployees() {
            try {
                const res = await fetch('/api/admin/employees');
                if(res.ok) {
                    const employees = await res.json();
                    const list = document.getElementById('employees-list');
                    if (!list) return;
                    list.innerHTML = '';
                    employees.forEach(emp => {
                        const statusColor = emp.presence === 'Online' ? '#00e676' : '#9e9e9e';
                        list.innerHTML += `
                            <div class="glass-card" style="padding: 25px; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05);">
                                <div>
                                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                                        <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent-secondary); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem;">
                                            ${emp.username.charAt(0).toUpperCase()}
                                        </div>
                                        <div>
                                            <h3 style="color: var(--text-primary); margin: 0;">${emp.username}</h3>
                                            <p style="font-size: 0.9rem; color: var(--accent-secondary); margin: 0;">${emp.designation}</p>
                                        </div>
                                    </div>
                                    <p style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 15px; margin-bottom: 5px;">Role: ${emp.role}</p>
                                    <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: ${statusColor}; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 20px; display: inline-flex;">
                                        <span style="width: 8px; height: 8px; border-radius: 50%; background: ${statusColor}; box-shadow: 0 0 8px ${statusColor};"></span>
                                        ${emp.presence}
                                    </div>
                                </div>
                                <div style="border-left: 1px solid var(--glass-border); padding-left: 20px;">
                                    <p style="color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;">Responsibilities</p>
                                    <p style="font-size: 0.95rem; margin-bottom: 20px; color: #ddd; line-height: 1.5;">${emp.responsibilities || 'N/A'}</p>
                                    
                                    <p style="color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;">Performance</p>
                                    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03);">
                                        <p style="font-size: 0.9rem; color: #ccc; line-height: 1.5; white-space: pre-line;">${emp.performance || 'N/A'}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) { console.error(e); }
        }

        function openAddEmployeeModal() {
            document.getElementById('employee-modal').style.display = 'flex';
        }

        const addEmpForm = document.getElementById('add-employee-form');
        if (addEmpForm) {
            addEmpForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('emp-username').value;
                const password = document.getElementById('emp-password').value;
                const designation = document.getElementById('emp-designation').value;
                const role = document.getElementById('emp-role').value;
                
                try {
                    const res = await fetch('/api/admin/employees', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            username, password, designation, role,
                            presence: 'Offline',
                            performance: 'Q1: N/A\nMonthly: Pending Evaluation',
                            responsibilities: 'Pending Assignment'
                        })
                    });
                    if(res.ok) {
                        document.getElementById('employee-modal').style.display = 'none';
                        document.getElementById('add-employee-form').reset();
                        fetchEmployees();
                    } else {
                        alert('Failed to add employee');
                    }
                } catch (err) { console.error(err); }
            });
        }

        // Initialize and start fetching
        fetchMessages();
        
        // Auto-refresh every 60 seconds to check for new transmissions
        setInterval(fetchMessages, 60000);
    </script>
</body>
</html>
